use_default_settings: true

general:
  instance_name: "SearXNG Railway"

server:
  secret_key: "9xK3pL2vQ7tA4sM8ZcR1YwF6HnU5bE0D"
  limiter: false
  image_proxy: false
  method: "GET"

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - json
    - html

ui:
  default_theme: simple

outgoing:
  request_timeout: 3
  max_request_timeout: 6

engines:
  - name: google
    engine: google
    shortcut: go
    categories: general
    timeout: 3

  - name: arxiv
    engine: arxiv
    shortcut: ax
    categories: science, general
    timeout: 3

  - name: semantic scholar
    engine: semantic_scholar
    shortcut: ss
    categories: science, general
    timeout: 3

  - name: pubmed
    engine: pubmed
    shortcut: pm
    categories: science, general
    timeout: 3

  - name: startpage
    engine: startpage
    shortcut: sp
    categories: general
    timeout: 3

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: general
    timeout: 3

  - name: wikidata
    engine: wikidata
    shortcut: wd
    categories: general
    timeout: 3

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: true

  - name: bing
    engine: bing
    shortcut: bi
    disabled: true

  - name: brave
    engine: brave
    shortcut: br
    disabled: true

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: true

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: true

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: true
```

**Key changes:**
- `request_timeout: 3` — each engine gets 3 seconds max
- `max_request_timeout: 6` — SearXNG returns results within 6 seconds total
- `timeout: 3` — per-engine timeout set individually

This means SearXNG will always respond within 6 seconds — well under any n8n timeout threshold. Slow engines get cut off at 3 seconds and SearXNG returns whatever results it has collected so far.

**Also add to your n8n Railway environment variables:**
```
N8N_DEFAULT_TIMEOUT=15000
